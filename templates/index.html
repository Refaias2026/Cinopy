<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cinopy</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111;
      margin: 0;
      padding: 0;
      color: #fff;
    }

    header {
      background: linear-gradient(90deg, #000, #8b0000);
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 2.5em;
      color: #ff2c2c;
    }

    header p {
      margin: 5px 0 0;
      color: #ccc;
    }

    .container {
      width: 90%;
      max-width: 800px;
      margin: 20px auto;
    }

    .card {
      background: #1c1c1c;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    h2 {
      margin-top: 0;
      color: #ff2c2c;
    }

    .ranking-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #333;
    }

    .btn {
      display: inline-block;
      background: #ff2c2c;
      color: white;
      padding: 10px;
      border-radius: 5px;
      text-decoration: none;
      margin-top: 10px;
      text-align: center;
      cursor: pointer;
      border: none;
    }

    .btn:hover {
      background: #cc0000;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: 1px solid #333;
      background: #222;
      color: #fff;
    }

    .nova-avaliacao {
      margin-top: 10px;
      padding: 10px;
      background: #222;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<header>
  <h1>🎬 Cinopy</h1>
  <p>Resenhas e Rankings de Filmes</p>
</header>

<div class="container">

  <div class="card">
    <h2>🏆 Ranking da Galera</h2>
    <div class="ranking-item">
      <span>1. O Plano Perfeito</span>
      <span>⭐ 9.2</span>
    </div>
    <div class="ranking-item">
      <span>2. Estrada sem Lei</span>
      <span>⭐ 8.8</span>
    </div>
    <div class="ranking-item">
      <span>3. Superman 2025</span>
      <span>⭐ 8.5</span>
    </div>
    <div class="ranking-item">
      <span>4. O Agente Secreto</span>
      <span>⭐ 8.3</span>
    </div>
    <div class="ranking-item">
      <span>5. Uma Batalha Após a Outra</span>
      <span>⭐ 8.0</span>
    </div>
  </div>

  <div class="card">
    <h2>👥 Indicações da Galera</h2>
    <div id="lista-indicacoes"></div>
  </div>

  <div class="card">
    <h2>⭐ Avaliar um Filme</h2>
    <input type="text" id="filme" placeholder="Nome do filme">
    <input type="number" id="nota" placeholder="Nota (0 a 10)">
    <textarea id="comentario" placeholder="Sua opinião..."></textarea>
    <button class="btn" onclick="enviarAvaliacao()">Enviar</button>
  </div>

</div>

<script>
  function salvarNoLocalStorage(avaliacoes) {
    localStorage.setItem("avaliacoes", JSON.stringify(avaliacoes));
  }

  function carregarDoLocalStorage() {
    var dados = localStorage.getItem("avaliacoes");
    return dados ? JSON.parse(dados) : [];
  }

  function mostrarAvaliacoes() {
    var lista = document.getElementById("lista-indicacoes");
    lista.innerHTML = "";

    var avaliacoes = carregarDoLocalStorage();

    avaliacoes.forEach(function(item) {
      var novaDiv = document.createElement("div");
      novaDiv.classList.add("nova-avaliacao");

      novaDiv.innerHTML = "<p><strong>Filme:</strong> " + item.filme + "</p>" +
                          "<p><strong>Nota:</strong> " + item.nota + "</p>" +
                          "<p><strong>Comentário:</strong> " + item.comentario + "</p>";

      lista.appendChild(novaDiv);
    });
  }

  function enviarAvaliacao() {
    var filme = document.getElementById("filme").value;
    var nota = document.getElementById("nota").value;
    var comentario = document.getElementById("comentario").value;

    if (filme === "" || nota === "" || comentario === "") {
      alert("Preencha todos os campos!");
      return;
    }

    var avaliacoes = carregarDoLocalStorage();

    avaliacoes.push({
      filme: filme,
      nota: nota,
      comentario: comentario
    });

    salvarNoLocalStorage(avaliacoes);

    mostrarAvaliacoes();

    document.getElementById("filme").value = "";
    document.getElementById("nota").value = "";
    document.getElementById("comentario").value = "";
  }

  // Carregar ao abrir o site
  mostrarAvaliacoes();
</script>

</body>
</html>
