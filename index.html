<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta http-equiv="Cache-Control" content="no-store" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
  <meta charset="UTF-8">
  <title>Cinopy</title>

  <!-- 🔥 FORÇA NÃO USAR CACHE -->
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #111;
      margin: 0;
      padding: 0;
      color: #fff;
    }

    header {
      background: linear-gradient(90deg, #000, #8b0000);
      padding: 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 2.5em;
      color: #ff2c2c;
    }

    header p {
      margin: 5px 0 0;
      color: #ccc;
    }

    .container {
      width: 90%;
      max-width: 800px;
      margin: 20px auto;
    }

    .card {
      background: #1c1c1c;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    h2 {
      margin-top: 0;
      color: #ff2c2c;
    }

    .ranking-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #333;
    }

    .btn {
      display: inline-block;
      background: #ff2c2c;
      color: white;
      padding: 10px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      background: #cc0000;
    }

    textarea {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: 1px solid #333;
      background: #222;
      color: #fff;
    }

    .nova-avaliacao {
      margin-top: 10px;
      padding: 10px;
      background: #222;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<header>
  <h1>🎬 Cinopy</h1>
  <p>Resenhas e Rankings de Filmes</p>
</header>

<div class="container">

  <div class="card">
    <h2>🏆 Ranking da Galera</h2>
    <div class="ranking-item"><span>1. O Plano Perfeito</span><span>⭐ 9.2</span></div>
    <div class="ranking-item"><span>2. Estrada sem Lei</span><span>⭐ 8.8</span></div>
    <div class="ranking-item"><span>3. Superman 2025</span><span>⭐ 8.5</span></div>
    <div class="ranking-item"><span>4. O Agente Secreto</span><span>⭐ 8.3</span></div>
    <div class="ranking-item"><span>5. Uma Batalha Após a Outra</span><span>⭐ 8.0</span></div>
  </div>

  <div class="card">
    <h2>👥 Indicações da Galera</h2>

    {% for review in reviews %}
  <div class="nova-avaliacao">
    <p>{{ review }}</p>
  </div>
{% endfor %}

  </div>

  <div class="card">
    <h2>⭐ Avaliar um Filme</h2>

    <form method="POST">
      <textarea name="texto" placeholder="Escreva sua resenha..." required></textarea>
      <button class="btn" type="submit">Enviar</button>
    </form>

  </div>

</div>

</body>
</html>
